<!-- ================================================
     LOGIN PAGE
     ================================================ -->
<div class="screen active" id="login">
  <div class="login-bg-circle c1"></div>
  <div class="login-bg-circle c2"></div>

  <div class="login-logo">
    <div class="logo-badge">YPC</div>
    <h1>YPC International College</h1>
    <p>Student Portal</p>
  </div>

  <div class="login-card">
    <h2>Welcome back 👋</h2>
    <p>Sign in to your student account</p>

    <div class="input-group">
      <label>STUDENT ID</label>
      <input type="text" placeholder="e.g. 23BIS12345" id="loginId" value="23BIS12345">
    </div>
    <div class="input-group">
      <label>PASSWORD</label>
      <input type="password" placeholder="Enter your password" value="••••••••">
    </div>

    <button class="btn-primary" onclick="goTo('dashboard')">Sign In →</button>
  </div>
</div>
